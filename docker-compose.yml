# PostgreSQL 18 for TheWebsiteForge (local + production via Docker).
# Usage:
#   docker compose up -d        # start the database
#   docker compose down         # stop it (data is kept in the named volume)
#   docker compose down -v      # stop AND delete all data
#
# Credentials are read from your .env file (see .env.example).
services:
  postgres:
    image: postgres:18-alpine
    container_name: twf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-twf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-twf_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-thewebsiteforge}
    ports:
      # host:container — change the host port if 5432 is already in use locally
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - twf_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-twf} -d ${POSTGRES_DB:-thewebsiteforge}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  twf_pgdata:
    name: twf_pgdata
